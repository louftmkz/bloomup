  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#FDF8F4;--c-card:#FFF;--c-primary:#C4687A;--c-pl:#F6DDE3;
  --c-sec:#7A9E87;--c-sl:#D9EAE0;--c-txt:#2C2420;--c-muted:#8A7F7C;
  --c-border:#EDE5E0;--c-ok:#5B9A70;--r:18px;--rs:12px;
  --shadow:0 2px 20px rgba(0,0,0,.06);--tab-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--c-bg);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--c-txt);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px)}
#tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--c-border);display:flex;z-index:100}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:6px 4px;-webkit-tap-highlight-color:transparent;color:var(--c-muted)}
.tb .tl{font-size:10px;font-weight:600;letter-spacing:.3px}
.tb.active{color:var(--c-primary)}
.tb.active svg{transform:scale(1.12)}
.page{display:none;padding:calc(env(safe-area-inset-top) + 20px) 16px 0;animation:fu .18s ease}
.page.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.3px;font-family:'Playfair Display',Georgia,serif}
.page-sub{font-size:14px;color:var(--c-muted);margin-top:2px;margin-bottom:20px}
.card{background:var(--c-card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.clbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--c-muted);margin-bottom:12px}
.hero{background:linear-gradient(135deg,#C4687A 0%,#A3506A 100%);color:white;border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:0 6px 28px rgba(196,104,122,.3)}
.hero-name{font-size:22px;font-weight:700;font-family:'Playfair Display',Georgia,serif}
.hero-date{font-size:13px;opacity:.8;margin-top:2px;margin-bottom:16px}
.hero-chips{display:flex;gap:10px}
.hc{flex:1;background:rgba(255,255,255,.15);border-radius:12px;padding:10px 8px;text-align:center}
.hc-v{font-size:22px;font-weight:700}
.hc-l{font-size:10px;opacity:.8;margin-top:1px}
.hp{margin-top:14px}
.hp-row{display:flex;justify-content:space-between;font-size:11px;opacity:.8;margin-bottom:5px}
.ptrack{height:5px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:rgba(255,255,255,.85);border-radius:3px;transition:width .6s}
.ci{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--c-border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.ci:last-child{border-bottom:none}
.ci:active{opacity:.6}
.ci-ico{width:28px;text-align:center;flex-shrink:0;color:var(--c-primary)}
.ci-txt{flex:1}
.ci-lbl{font-size:15px;font-weight:500;color:var(--c-txt);transition:color .2s}
.ci-dsc{font-size:12px;color:var(--c-muted);margin-top:1px}
.ci-box{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--c-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.ci.done .ci-box{background:var(--c-ok);border-color:var(--c-ok)}
.ci.done .ci-box::after{content:'\2713';color:white;font-size:13px;font-weight:800}
.ci.done .ci-lbl{color:var(--c-muted);text-decoration:line-through}
.wo-btns{display:flex;gap:8px;margin-top:10px}
.wo-btn{flex:1;padding:12px 6px;border:2px solid var(--c-border);border-radius:var(--rs);background:none;font-size:14px;font-weight:700;color:var(--c-muted);cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;font-family:inherit}
.wo-btn.selected{border-color:var(--c-primary);background:var(--c-pl);color:var(--c-primary)}
.wo-det{margin-top:12px;background:var(--c-bg);border-radius:var(--rs);padding:10px 12px}
.wo-ex{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--c-border)}
.wo-ex:last-child{border-bottom:none}
.wo-ex-n{font-weight:500}
.wo-ex-s{color:var(--c-muted);font-size:13px}
.rest-pill{display:inline-flex;align-items:center;gap:6px;background:var(--c-sl);color:var(--c-sec);border-radius:20px;padding:8px 14px;font-size:14px;font-weight:600;margin-top:8px}
.rest-pill .ms,.rest-pill i{font-size:16px}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.acc-tr{display:flex;align-items:center;gap:8px}
.acc-tr .ms,.acc-tr i{font-size:18px;color:var(--c-primary)}
.acc-title{font-size:15px;font-weight:600;color:var(--c-txt)}
.acc-arr{font-size:11px;color:var(--c-muted);transition:transform .2s}
.acc-open .acc-arr{transform:rotate(180deg)}
.acc-body{display:none;margin-top:12px}
.acc-open .acc-body{display:block}
.bonus-row{display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bonus-row:active{opacity:.7}
.bonus-row .ms,.bonus-row i{font-size:22px;color:var(--c-primary);flex-shrink:0}
.bonus-info{flex:1}
.bonus-title{font-size:15px;font-weight:600;color:var(--c-txt)}
.bonus-sub{font-size:12px;color:var(--c-muted);margin-top:1px}
.pbar{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden;margin-top:8px}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--c-card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.stat-v{font-size:30px;font-weight:700;color:var(--c-primary)}
.stat-l{font-size:12px;color:var(--c-muted);margin-top:2px}
.ms-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--c-border)}
.ms-row:last-child{border-bottom:none}
.ms-bdg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ms-bdg svg,.ms-bdg i{width:22px;height:22px}
.ms-bdg.locked{background:var(--c-border);opacity:.5;color:var(--c-muted)}
.ms-bdg.reached{background:var(--c-pl);color:var(--c-primary)}
.ms-info{flex:1}
.ms-ttl{font-size:15px;font-weight:600;color:var(--c-txt)}
.ms-sub{font-size:12px;color:var(--c-muted);margin-top:1px}
.w-row{display:flex;gap:10px;align-items:center}
.w-in{flex:1;padding:11px 14px;border:2px solid var(--c-border);border-radius:var(--rs);font-size:17px;font-weight:600;background:var(--c-bg);color:var(--c-txt);-webkit-appearance:none;font-family:inherit}
.w-in:focus{outline:none;border-color:var(--c-primary)}
.btn{padding:12px 18px;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--c-primary);color:white}
.btn-s{background:var(--c-sl);color:var(--c-sec)}
.btn-g{background:none;color:var(--c-muted)}
.btn-full{width:100%;display:block;margin-bottom:8px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photo-cell{aspect-ratio:1;border-radius:10px;background:var(--c-bg);border:2px dashed var(--c-border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent}
.photo-cell img{width:100%;height:100%;object-fit:cover}
.pa-lbl{font-size:9px;color:var(--c-muted);margin-top:3px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--c-muted);padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cal-day.empty{cursor:default}
.cal-day.out{opacity:.2;cursor:default}
.cal-day.future{background:var(--c-border);color:var(--c-muted);opacity:.4;cursor:default}
.cal-day.none{background:var(--c-border);color:var(--c-muted)}
.cal-day.partial{background:var(--c-pl);color:var(--c-primary)}
.cal-day.complete{background:var(--c-ok);color:white}
.cal-day.today{outline:2.5px solid var(--c-primary);outline-offset:1px}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--c-border)}
.s-row:last-child{border-bottom:none}
.s-lbl{font-size:15px;font-weight:500;color:var(--c-txt)}
.s-sub{font-size:12px;color:var(--c-muted);margin-top:1px}
.s-in{border:none;background:var(--c-bg);padding:6px 10px;border-radius:8px;font-size:15px;color:var(--c-txt);text-align:right;max-width:150px;font-family:inherit}
.s-in:focus{outline:none}
.toggle{width:50px;height:30px;background:var(--c-border);border-radius:15px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--c-ok)}
.toggle::after{content:'';position:absolute;width:26px;height:26px;background:white;border-radius:50%;top:2px;left:2px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(20px)}
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.sheet{background:white;width:100%;border-radius:20px 20px 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:19px;font-weight:700;text-align:center;margin-bottom:16px;font-family:'Playfair Display',Georgia,serif}
.field{margin-bottom:14px}
.field-lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--c-muted);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 12px;border:2px solid var(--c-border);border-radius:var(--rs);font-size:15px;font-family:inherit;background:var(--c-bg);color:var(--c-txt);-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--c-primary)}
.field textarea{resize:none;min-height:52px}
.edit-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--c-border)}
.edit-item-row:last-child{border-bottom:none}
.edit-item-row .row-icon{color:var(--c-primary);width:26px;display:flex;align-items:center;flex-shrink:0;cursor:pointer}
.edit-item-row .row-title{flex:1;font-size:14px;font-weight:500;color:var(--c-txt)}
.edit-item-row .del-btn{border:none;background:none;padding:6px;color:var(--c-muted);cursor:pointer;font-size:20px;flex-shrink:0;line-height:1}
.icon-picker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:10px 0}
.icon-pick-btn{aspect-ratio:1;border-radius:10px;border:2px solid var(--c-border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.icon-pick-btn{color:var(--c-txt)}
.icon-pick-btn.selected{border-color:var(--c-primary);background:var(--c-pl);color:var(--c-primary)}
.icon-pick-btn:active{transform:scale(.9)}
.icon-preview{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--c-bg);border-radius:var(--rs);padding:14px;margin-bottom:12px}
.icon-preview svg,.icon-preview i{width:32px;height:32px;color:var(--c-primary)}
.add-btn-row{display:flex;justify-content:center;padding:10px 0}
.add-btn{border:2px dashed var(--c-border);background:none;border-radius:var(--rs);padding:10px 20px;font-size:14px;font-weight:600;color:var(--c-muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
.add-btn .ms,.add-btn i{font-size:16px}
.done-banner{text-align:center;padding:20px}
.done-banner .ms,.done-banner i{font-size:52px;color:#E8A87C}
.done-banner .db-t{font-size:19px;font-weight:700;margin-top:8px;font-family:'Playfair Display',Georgia,serif}
.done-banner .db-s{font-size:14px;color:var(--c-muted);margin-top:4px}
.toast{position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%);background:#2C2420;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:300;pointer-events:none;animation:toastIn .25s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}}
#onboarding{position:fixed;inset:0;background:var(--c-bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:32px 24px}
#onboarding.hidden{display:none}
.ob-inner{width:100%;max-width:360px}
.ob-emoji{font-size:56px;text-align:center;margin-bottom:16px}
.ob-title{font-size:36px;font-weight:700;text-align:center;margin-bottom:8px;font-family:'Playfair Display',Georgia,serif;letter-spacing:-.5px}
.ob-sub{font-size:15px;color:var(--c-muted);text-align:center;margin-bottom:32px;line-height:1.5;font-family:'Playfair Display',Georgia,serif;font-style:italic}
.ob-field{margin-bottom:14px}
.ob-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--c-muted);margin-bottom:6px}
.ob-input{width:100%;padding:14px 16px;border:2px solid var(--c-border);border-radius:var(--rs);font-size:17px;font-family:inherit;background:white;color:var(--c-txt);-webkit-appearance:none}
.ob-input:focus{outline:none;border-color:var(--c-primary)}

.ico{display:inline-block;width:20px;height:20px;vertical-align:middle;flex-shrink:0}
  </style>
</head>

function ico(name,sz,color){
  var n=ICON_MAP[name]||name;
  var p=ICON_SVGS[n]||ICON_SVGS['star'];
  var w=sz||20;
  var st='display:inline-block;width:'+w+'px;height:'+w+'px;vertical-align:middle;flex-shrink:0';
  if(color)st+=';color:'+color;
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="'+st+'">'+p+'</svg>';
}
function replaceMsSpans(root){
  (root||document.body).querySelectorAll('span.ms').forEach(function(s){
    var n=s.firstChild&&s.firstChild.nodeType===3?s.firstChild.nodeValue.trim():s.textContent.trim();
    var mapped=ICON_MAP[n]||n;
    if(!ICON_SVGS[mapped])return;
    var sz=20;
    if(s.classList.contains('lg'))sz=26;
    if(s.classList.contains('xl'))sz=36;
    if(s.style.fontSize)sz=parseInt(s.style.fontSize)||sz;
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','2');
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    var st='display:inline-block;width:'+sz+'px;height:'+sz+'px;vertical-align:middle;flex-shrink:0';
    if(s.style.color)st+=';color:'+s.style.color;
    svg.setAttribute('style',st);
    if(s.id)svg.id=s.id;
    s.classList.forEach(function(c){if(c!=='ms'&&c!=='lg'&&c!=='xl')svg.classList.add(c);});
    Array.from(s.attributes).forEach(function(a){if(a.name.startsWith('data-')||a.name==='onclick')svg.setAttribute(a.name,a.value);});
    svg.innerHTML=ICON_SVGS[mapped];
    s.replaceWith(svg);
  });
}
new MutationObserver(function(muts){
  muts.forEach(function(m){
    m.addedNodes.forEach(function(node){
      if(node.nodeType===1&&node.querySelectorAll)replaceMsSpans(node);
    });
  });
}).observe(document.body,{childList:true,subtree:true});

function getCL()  { return S.config.checklist || D_CHECKLIST; }
function getWO()  { return S.config.workouts   || D_WORKOUTS; }

// =========== DATE HELPERS ===========
const today=()=>new Date().toISOString().split('T')[0];
const d2n=(ds)=>Math.floor((new Date(ds)-new Date(S.settings.startDate))/86400000)+1;
const n2d=(n)=>{const d=new Date(S.settings.startDate);d.setDate(d.getDate()+n-1);return d.toISOString().split('T')[0];};
const curDay=()=>Math.max(1,Math.min(d2n(today()),TOTAL));
const isTrain=(ds)=>TRAIN.includes(new Date(ds).getDay());
function gdd(ds){if(!S.days[ds])S.days[ds]={check:{},workout:null,morning:{},evening:{},bonus:false};return S.days[ds];}
function comp(ds){
  const d=S.days[ds]; if(!d)return 0;
  const cl=getCL();
  const checks=cl.filter(i=>d.check[i.id]).length;
  const t=cl.length+(isTrain(ds)?1:0);
  const dn=checks+(isTrain(ds)&&d.workout?1:0);
  return t>0?dn/t:0;
}
const isDone=(ds)=>comp(ds)>=1;
function streak(){
  let s=0,d=new Date(today());
  if(!isDone(today()))d.setDate(d.getDate()-1);
  for(let i=0;i<TOTAL;i++){const ds=d.toISOString().split('T')[0];if(d2n(ds)<1)break;if(!isDone(ds))break;s++;d.setDate(d.getDate()-1);}
  return s;
}
function bestStreak(){let b=0,c=0;for(let i=0;i<TOTAL;i++){const ds=n2d(i+1);if(ds>today())break;isDone(ds)?(c++,b=Math.max(b,c)):c=0;}return b;}
function compDays(){let c=0;for(let i=0;i<TOTAL;i++){const ds=n2d(i+1);if(ds>today())break;if(isDone(ds))c++;}return c;}
function bonusCt(){return Object.values(S.days).filter(d=>d.bonus).length;}

function renderHistory(){
  const p=document.getElementById('page-history');
  if(!S.settings.startDate){p.innerHTML='<div class="card" style="text-align:center;padding:40px">Bitte Startdatum setzen.</div>';return;}
  const start=new Date(S.settings.startDate),end=new Date(n2d(TOTAL));
  const months=[];let cur=new Date(start.getFullYear(),start.getMonth(),1);
  while(cur<=end){months.push(new Date(cur));cur.setMonth(cur.getMonth()+1);}
  let html='<div class="page-title">Verlauf</div><div class="page-sub">75 Tage im \xdcberblick</div>';
  months.forEach(ms=>{
    const mn=ms.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
    const fd=ms.getDay(),off=fd===0?6:fd-1;
    const dim=new Date(ms.getFullYear(),ms.getMonth()+1,0).getDate();
    html+=`<div class="card"><div class="clbl">${mn}</div><div class="cal-grid">`;
    ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>html+=`<div class="cal-hdr">${d}</div>`);
    for(let i=0;i<off;i++)html+='<div class="cal-day empty"></div>';
    for(let d=1;d<=dim;d++){
      const ds=new Date(ms.getFullYear(),ms.getMonth(),d).toISOString().split('T')[0];
      const dn=d2n(ds),it=ds===today();
      if(dn<1||dn>TOTAL){html+=`<div class="cal-day out">${d}</div>`;continue;}
      if(ds>today()){html+=`<div class="cal-day future">${d}</div>`;continue;}
      const c=comp(ds),cls=c>=1?'complete':c>0?'partial':'none';
      html+=`<div class="cal-day ${cls}${it?' today':''}" data-ds="${ds}" onclick="showDayDetailEl(this)">${d}</div>`;
    }
    html+='</div></div>';
  });
  p.innerHTML=html;
}

function drawWeightChart(){
  const wrap=document.getElementById('w-chart-wrap');if(!wrap)return;
  const entries=Object.entries(S.weights).sort((a,b)=>a[0].localeCompare(b[0]));
  if(entries.length<2){wrap.innerHTML='<div style="font-size:12px;color:var(--c-muted);margin-top:8px">Mindestens 2 Eintr\xe4ge f\xfcr die Grafik</div>';return;}
  const cvs=document.createElement('canvas');cvs.style.cssText='width:100%;margin-top:14px';
  wrap.innerHTML='';wrap.appendChild(cvs);
  const W=cvs.offsetWidth||300,H=110;cvs.width=W;cvs.height=H;
  const ctx=cvs.getContext('2d');
  const vals=entries.map(e=>parseFloat(e[1]));
  const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1;
  const px=8,py=16,cw=W-px*2,ch=H-py*2;
  const xp=i=>px+(i/(entries.length-1))*cw,yp=v=>py+(1-(v-mn)/(mx-mn))*ch;
  ctx.beginPath();entries.forEach((e,i)=>i===0?ctx.moveTo(xp(i),yp(vals[i])):ctx.lineTo(xp(i),yp(vals[i])));
  ctx.lineTo(xp(entries.length-1),H);ctx.lineTo(xp(0),H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(196,104,122,.22)');g.addColorStop(1,'rgba(196,104,122,0)');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#C4687A';ctx.lineWidth=2.5;ctx.lineJoin='round';
  entries.forEach((e,i)=>i===0?ctx.moveTo(xp(i),yp(vals[i])):ctx.lineTo(xp(i),yp(vals[i])));
  ctx.stroke();
  ctx.fillStyle='#C4687A';
  entries.forEach((e,i)=>{ctx.beginPath();ctx.arc(xp(i),yp(vals[i]),4,0,Math.PI*2);ctx.fill();
    if(i===0||i===entries.length-1){ctx.fillStyle='#8A7F7C';ctx.font='10px DM Sans';ctx.textAlign=i===0?'left':'right';ctx.fillText(vals[i]+'kg',xp(i),yp(vals[i])-8);ctx.fillStyle='#C4687A';}
  });
}

function handlePhotoFile(e){
  const file=e.target.files[0];if(!file||!pendW)return;
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{
    const cv=document.createElement('canvas');const mx=480;
    let iw=img.width,ih=img.height;
    if(iw>ih){ih=ih/iw*mx;iw=mx;}else{iw=iw/ih*mx;ih=mx;}
    cv.width=iw;cv.height=ih;cv.getContext('2d').drawImage(img,0,0,iw,ih);
    S.photos[pendW]=cv.toDataURL('image/jpeg',.72);saveState();
    const pg=document.getElementById('photo-grid');if(pg)pg.innerHTML=buildPhotoGrid();
  };img.src=ev.target.result;};
  r.readAsDataURL(file);e.target.value='';
}

  sh.innerHTML+=`<div class="field"><div class="field-lbl">Wie viele Workouts geschafft?</div><input type="number" id="c0" placeholder="0-7"></div>
    <div class="field"><div class="field-lbl">Wie oft 8.000 Schritte erreicht?</div><input type="number" id="c1" placeholder="0-7"></div>
    <div class="field"><div class="field-lbl">Wie war deine Energie?</div><textarea id="c2" placeholder="gut / okay / niedrig …"></textarea></div>
    <div class="field"><div class="field-lbl">Milchproduktion?</div><textarea id="c3" placeholder="normal / mehr / weniger …"></textarea></div>
    <div class="field"><div class="field-lbl">Was lief gut?</div><textarea id="c4" placeholder="Deine Wins …"></textarea></div>
    <div class="field"><div class="field-lbl">Was passe ich an?</div><textarea id="c5" placeholder="Fokus n\xe4chste Woche …"></textarea></div>
    <button class="btn btn-p btn-full" onclick="saveCI()">Speichern</button>
    <button class="btn btn-g btn-full" onclick="document.querySelector('.sheet-ov').remove()">Abbrechen</button>`;
  ov.appendChild(sh);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}
function saveCI(){
  S.checkins[today()]={w:document.getElementById('c0')?.value,s:document.getElementById('c1')?.value,e:document.getElementById('c2')?.value,m:document.getElementById('c3')?.value,g:document.getElementById('c4')?.value,n:document.getElementById('c5')?.value};
  saveState();document.querySelector('.sheet-ov')?.remove();renderMore();toast('Check-in gespeichert ✅');
}
function showCiHistory(){
  const entries=Object.entries(S.checkins).sort((a,b)=>b[0].localeCompare(a[0]));
  const ov=makeSheetOv();const sh=makeSheet('Check-in Verlauf');
  sh.innerHTML+= entries.length===0?'<div style="text-align:center;color:var(--c-muted);padding:20px">Noch keine Check-ins</div>'
    :entries.map(([d,ci])=>`<div style="border-bottom:1px solid var(--c-border);padding:12px 0"><div style="font-weight:600;margin-bottom:5px">${new Date(d).toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})}</div><div style="font-size:13px;color:var(--c-muted);line-height:1.6">Workouts: ${ci.w||'—'} \xb7 Schritte: ${ci.s||'—'} Tage<br>Energie: ${ci.e||'—'}<br>Was lief gut: ${ci.g||'—'}</div></div>`).join('');
  sh.innerHTML+=`<button class="btn btn-g btn-full" style="margin-top:12px" onclick="document.querySelector('.sheet-ov').remove()">Schlie\xdfen</button>`;
  ov.appendChild(sh);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}
function showDayDetail(ds){
  const data=S.days[ds],dn=d2n(ds),c=comp(ds);
  const df=new Date(ds).toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
  const ov=makeSheetOv();const sh=makeSheet(`Tag ${dn} \xb7 ${df}`);
  const checks=data?getCL().filter(i=>data.check[i.id]):[];
  sh.innerHTML+=(!data||c===0)?'<div style="text-align:center;color:var(--c-muted);padding:20px">Keine Daten</div>'
    :`<div style="text-align:center;margin-bottom:14px"><div style="font-size:32px;font-weight:700;color:${c>=1?'var(--c-ok)':'var(--c-primary)'}">${Math.round(c*100)}%</div><div style="font-size:13px;color:var(--c-muted)">abgehakt</div></div>
    ${data.workout?`<div style="background:var(--c-pl);color:var(--c-primary);border-radius:10px;padding:10px;font-weight:600;font-size:13px;margin-bottom:10px"><span class="ms">fitness_center</span> Workout ${data.workout} erledigt</div>`:''}
    <div style="display:flex;flex-direction:column;gap:6px">${checks.map(i=>`<div style="font-size:14px;display:flex;align-items:center;gap:8px">${ico(i.icon,18,'var(--c-primary)')}${i.label}</div>`).join('')}</div>
    ${data.bonus?`<div style="margin-top:10px;font-size:14px;display:flex;align-items:center;gap:8px">${ico('directions_walk',18,'var(--c-primary)')}Bonus-Walk ✅</div>`:''}`;
  sh.innerHTML+=`<button class="btn btn-g btn-full" style="margin-top:14px" onclick="document.querySelector('.sheet-ov').remove()">Schlie\xdfen</button>`;
  ov.appendChild(sh);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}
function toggleNotif(){
  if(!S.settings.notifEnabled){
    if('Notification' in window){
      Notification.requestPermission().then(p=>{
        if(p==='granted'){S.settings.notifEnabled=true;saveState();renderMore();}
        else toast('Benachrichtigungen abgelehnt');
      });
    } else toast('Bitte App zum Homescreen hinzuf\xfcgen');
  } else {S.settings.notifEnabled=false;saveState();renderMore();}
}
function updateSetting(k,v){S.settings[k]=v;saveState();}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:`bloomup-${today()}.json`}).click();
  URL.revokeObjectURL(url);
}
function importData(){
  const inp=Object.assign(document.createElement('input'),{type:'file',accept:'application/json'});
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(confirm('Daten importieren?')){S=imp;saveState();renderToday();toast('Importiert ✅');}}catch{toast('Ung\xfcltige Datei');}};r.readAsText(f);};
  inp.click();
}

// =========== HELPERS ===========
const vib=()=>navigator.vibrate&&navigator.vibrate(12);
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},2000);
}
function makeSheetOv(){const ov=document.createElement('div');ov.className='sheet-ov';return ov;}
function makeSheet(title){
  const sh=document.createElement('div');sh.className='sheet';
  sh.innerHTML=`<div class="sheet-handle"></div><div class="sheet-title">${title}</div>`;
  return sh;
}

// =========== NAVIGATION ===========
let currentTab='today';
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector(`.tb[onclick="switchTab('${tab}')"]`).classList.add('active');
  currentTab=tab;document.getElementById('content').scrollTop=0;
  if(tab==='today')renderToday();
  else if(tab==='history')renderHistory();
  else if(tab==='progress')renderProgress();
  else if(tab==='more')renderMore();
}

// =========== ONBOARDING ===========
function checkOnboarding(){
  if(!S.settings.startDate||!S.settings.name){
    const ob=document.getElementById('onboarding');ob.classList.remove('hidden');
    const ne=document.getElementById('ob-name'),de=document.getElementById('ob-date');
    if(ne&&!ne.value)ne.value=S.settings.name||'';
    if(de&&!de.value)de.value=S.settings.startDate||'2026-06-18';
  }
}
function finishOnboarding(){
  const name=document.getElementById('ob-name')?.value?.trim();
  const date=document.getElementById('ob-date')?.value;
  if(!name){toast('Bitte Namen eingeben');return;}
  if(!date){toast('Bitte Startdatum w\xe4hlen');return;}
  S.settings.name=name;S.settings.startDate=date;saveState();
  document.getElementById('onboarding').classList.add('hidden');renderToday();
}

// =========== SERVICE WORKER ===========
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// =========== INIT ===========
checkOnboarding();
if(S.settings.startDate&&S.settings.name)renderToday();
replaceMsSpans();
</script>
</body>
</html>
